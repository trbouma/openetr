facts:
  - "MLETR is the UNCITRAL Model Law on Electronic Transferable Records."
  - "UNCITRAL adopted MLETR on July 13, 2017."
  - "The United Nations General Assembly later welcomed and recommended MLETR in resolution 72/114 on December 7, 2017."
  - "UNCITRAL Working Group IV (Electronic Commerce) was mandated in 2011 to work on electronic transferable records."
  - "The Working Group devoted 10 sessions, from 2011 to 2016, to the drafting work that led to MLETR."
  - "MLETR was designed to enable the legal use of electronic transferable records both domestically and across borders."
  - "MLETR follows the same core electronic commerce principles UNCITRAL used elsewhere: non-discrimination, functional equivalence, and technology neutrality."
  - "Technology neutrality in MLETR means the law is not tied to any one technical architecture."
  - "UNCITRAL expressly says MLETR can accommodate registries, tokens, distributed ledgers, and other technologies."
  - "MLETR does not replace substantive commercial law; it complements it."
  - "UNCITRAL describes control as a fundamental notion in MLETR."
  - "In MLETR, control plays the functional role that possession plays for a paper transferable document or instrument."
  - "MLETR is about records that have paper-world equivalents, not purely digital asset classes with no paper analogue."
  - "UNCITRAL notes that transferability and negotiability are related but not identical concepts."
  - "An electronic transferable record must contain the information required for the equivalent paper document or instrument."
  - "The electronic record must also be identifiable as the electronic transferable record."
  - "The record must remain capable of being subject to control from creation until it ceases to have effect or validity."
  - "The integrity of the electronic transferable record must be retained."
  - "Nothing in MLETR requires a person to use an electronic transferable record without consent."
  - "UNCITRAL explains that consent to use an electronic transferable record may be inferred from conduct."
  - "MLETR can help reduce friction in trade by allowing faster and more secure transmission of records."
  - "UNCITRAL highlights reuse of data as one of the practical benefits of electronic transferable records."
  - "UNCITRAL also notes that electronic transferable records can support automation, including through smart contracts."
  - "MLETR identifies transport and logistics as a major use area for electronic transferable records."
  - "MLETR also highlights finance and fintech as important use areas."
  - "UNCITRAL specifically notes that electronic warehouse receipts may help farmers gain access to credit."
  - "The UNCITRAL-UNIDROIT Model Law on Warehouse Receipts is commonly abbreviated as MLWR."
  - "MLWR focuses on warehouse receipts, including issuance, transfer, holders, protected holders, storage agreements, and warehouse operator obligations."
  - "MLWR treats warehouse receipts as records that may be paper-based or electronic, depending on the applicable implementation."
  - "In an OpenETR integration, MLWR-style rules belong in a domain adapter and recognition policy rather than in the base wire format."
  - "OpenETR can represent an electronic warehouse receipt as a controlled object identified by the digest of the receipt record."
  - "Under an MLWR-style profile, warehouse receipt terms such as depositor, holder, warehouse operator, protected holder, and goods map onto generic OpenETR profiles, participants, control events, and recognition rules."
  - "MLWR recognition questions include warehouse operator authority, goods custody, protected-holder status, security rights, priority, delivery obligations, and local-law effect."
  - "MLETR is positioned as a building block for paperless trade."
  - "UCC Article 12 was added to the Uniform Commercial Code to address certain digital assets and electronic records under the concept of controllable electronic records."
  - "UCC Article 12 uses control-oriented concepts for qualifying electronic records and related digital rights."
  - "OpenETR's control graph can provide signed evidence relevant to a UCC Article 12-style control analysis, but it does not by itself decide Article 12 legal effect."
  - "A UCC Article 12-oriented OpenETR profile would be a recognition policy layered over the generic verifier policy."
  - "UCC Article 12 focuses on legal consequences for controllable electronic records, while OpenETR focuses on portable signed evidence of control-relevant actions."
  - "OpenETR can support both MLWR-style warehouse receipt workflows and UCC Article 12-style control analysis without making either legal framework the base protocol."
  - "One historical obstacle was the risk of unauthorized duplication of transferable records in electronic form."
  - "A central legal challenge was how to recreate the unique-control effects of possession in a digital environment."
  - "UNCITRAL says legal certainty around electronic transferable records can improve commercial predictability."
  - "The definition of electronic record in MLETR includes information that is logically associated with or linked to the record."
  - "That means metadata and linked data can matter in assessing an electronic transferable record."
  - "The explanatory note says composite information can still form a single electronic transferable record."
  - "MLETR does not prescribe a single system design for establishing control."
  - "Reliability under MLETR can be shown either by the method’s suitability or by proof that the method actually fulfilled the required functions."
  - "The explanatory note discusses standards, auditability, and operational practice as relevant to reliability."
  - "MLETR is intended to remove legal obstacles to dematerializing certain commercial records, not to eliminate all business-process questions."
  - "MLETR leaves room for enacting states to adapt some details to national circumstances."
  - "The explanatory note was written for legislators, service providers, users, and academics."
  - "Some issues were intentionally left to the explanatory note instead of being exhaustively resolved in the black-letter articles."
  - "MLETR builds on earlier UNCITRAL texts, including the Model Law on Electronic Commerce, the Model Law on Electronic Signatures, and the Electronic Communications Convention."
  - "The Electronic Communications Convention had excluded several transferable documents and instruments because workable solutions were not yet mature."
  - "MLETR was drafted in part to close that gap."
  - "Article 2 of the Electronic Communications Convention was a starting point for MLETR’s scope discussion."
  - "UNCITRAL’s indicative list of transferable documents and instruments includes bills of exchange."
  - "UNCITRAL’s indicative list also includes cheques."
  - "Promissory notes are another classic MLETR-relevant instrument."
  - "Consignment notes are part of the indicative list mentioned in the explanatory note."
  - "Bills of lading are one of the most prominent examples tied to MLETR."
  - "Warehouse receipts are explicitly highlighted in MLETR materials."
  - "Insurance certificates appear in UNCITRAL’s indicative list of potentially transferable instruments."
  - "Air waybills are also listed in the explanatory note’s indicative examples."
  - "Bills of lading received substantial attention during the drafting work because of their importance in trade and title-to-goods questions."
  - "UNCITRAL’s explanatory note links earlier work on transport documents in the Model Law on Electronic Commerce to the later MLETR effort."
  - "The Rotterdam Rules use the concepts of electronic transport record and negotiable electronic transport record, which helped inform the broader policy discussion."
  - "Article 1 summarizes scope: MLETR applies to electronic transferable records, preserves substantive law, excludes certain matters such as securities, and lets enacting states list additional exclusions."
  - "Article 2 summarizes definitions: it defines electronic record, electronic transferable record, and transferable document or instrument."
  - "Article 3 summarizes interpretation: MLETR should be interpreted with regard to its international origin, the need for uniformity, and good faith."
  - "Article 4 summarizes party autonomy and privity: parties may derogate from or vary MLETR by agreement, subject to privity limits."
  - "Article 5 summarizes information requirements: information required in paper form can be satisfied electronically if the electronic transferable record complies with MLETR."
  - "Article 6 summarizes additional information: an electronic transferable record may contain information that could not appear in the paper equivalent because of the nature of the medium."
  - "Article 7 summarizes legal recognition: an electronic transferable record cannot be denied effect merely because it is electronic, but use still depends on consent."
  - "Article 8 summarizes writing: a writing requirement is met if the information is accessible so as to be usable for subsequent reference."
  - "Article 9 summarizes signature: a signature requirement is met if a reliable method identifies the signer and indicates the signer’s intention."
  - "Article 10 summarizes functional equivalence for transferable documents or instruments: the electronic record must carry the required information, be identifiable as the authoritative record, remain subject to control, and retain integrity."
  - "Article 11 summarizes control: possession is functionally replaced by a reliable method establishing exclusive control and identifying the person in control, and transfer occurs through transfer of control."
  - "Article 12 summarizes general reliability: the reliability of the method used under MLETR may be assessed in light of all relevant circumstances."
  - "Article 13 summarizes time and place indications: electronic transferable records may satisfy legal requirements to indicate time and place."
  - "Article 14 summarizes place of business: MLETR provides rules for determining place of business and avoids tying it automatically to where equipment or systems are located."
  - "Article 15 summarizes endorsement: where endorsement is required, it can be carried out electronically if the applicable requirements are met."
  - "Article 16 summarizes amendment: amendments are allowed if a reliable method identifies the amended information."
  - "Article 17 summarizes paper-to-electronic replacement: a transferable document or instrument may be replaced by an electronic transferable record if a reliable change-of-medium method is used and the paper record is made inoperative."
  - "Article 18 summarizes electronic-to-paper replacement: an electronic transferable record may be replaced by a paper transferable document or instrument if a reliable change-of-medium method is used and the electronic record is made inoperative."
  - "Article 19 summarizes cross-border recognition: an electronic transferable record cannot be denied legal effect merely because it was issued or used abroad."
  - "Article 1 expressly preserves applicable consumer protection rules."
  - "Article 1 also says MLETR does not apply to securities such as shares and bonds, or to other investment instruments."
  - "The explanatory note suggests enacting states may consider additional exclusions where appropriate."
  - "UNCITRAL notes that some items, such as letters of credit, may be treated differently across jurisdictions, which affects scope questions."
  - "Article 8’s writing rule is framed around accessibility and subsequent reference, not around paper-like formality."
  - "Article 9’s signature rule focuses on function, not on any particular cryptographic or platform standard."
  - "Integrity under Article 10 allows for changes that arise in the normal course of communication, storage, and display."
  - "Article 11 requires that the method used establish exclusive control, not just general access."
  - "Article 11 also requires identification of the person in control."
  - "Under Article 11, transferring control is the functional equivalent of transferring possession."
  - "Article 12’s general reliability standard supports a context-sensitive analysis instead of a single universal technical checklist."
  - "Article 13 is important because many commercial records must indicate when and where key acts occurred."
  - "Article 14 says the mere location of supporting information systems does not determine a party’s place of business."
  - "Article 14 also says using a domain name or email address tied to a country does not by itself establish place of business there."
  - "Article 15 works together with Articles 8 and 9, because electronic endorsement depends on satisfying writing and signature functions where needed."
  - "Article 16 is about preserving traceability of amendments rather than forbidding change altogether."
  - "Article 17 requires a statement indicating the change of medium to be inserted in the new electronic transferable record."
  - "Article 18 similarly requires a statement indicating the change of medium to be inserted in the replacement paper document or instrument."
  - "Both Article 17 and Article 18 say a valid change of medium does not affect the parties’ rights and obligations."
  - "Article 19 does not override private international law; it removes discrimination based solely on foreign issuance or foreign use."
  - "The explanatory note separately discusses the notion of original, even though MLETR is organized around control and integrity rather than paper originality."
  - "The explanatory note also separately discusses issuance of multiple originals as a practical legal issue."
  - "Storage and archiving are treated as important operational issues in the explanatory note."
  - "Third-party service providers are also discussed in the explanatory note because many deployments will involve platform or infrastructure operators."
  - "UNCITRAL says MLETR can assist states that are modernizing existing electronic commerce legislation and states that have none yet."
  - "Bahrain was the first state to enact legislation based on MLETR, in 2018."
  - "UNCITRAL’s status page lists Belize as an adopting jurisdiction in 2021."
  - "UNCITRAL’s status page lists Kiribati as an adopting jurisdiction in 2021."
  - "UNCITRAL’s status page lists Paraguay as an adopting jurisdiction in 2021."
  - "UNCITRAL’s status page lists Singapore as an adopting jurisdiction in 2021."
  - "UNCITRAL’s status page lists Abu Dhabi Global Market as an adopting jurisdiction in 2021."
  - "UNCITRAL’s status page lists Papua New Guinea as an adopting jurisdiction in 2022."
  - "UNCITRAL’s status page lists the United Kingdom in 2023 as legislation influenced by the Model Law and its principles."
  - "UNCITRAL’s status page lists France as an adopting jurisdiction in 2024."
  - "UNCITRAL’s status page lists Timor-Leste as an adopting jurisdiction in 2024."
  - "UNCITRAL’s status page lists China in 2025 with legislation only for bills of lading."
  - "UNCITRAL’s status page lists the Marshall Islands in 2025 as legislation influenced by the Model Law and its principles."
  - "UNCITRAL’s status page lists Mauritius in 2025 with legislation only for bills of exchange."
  - "UNCITRAL’s status page says it is updated whenever the UNCITRAL Secretariat is informed of changes in enactment."
