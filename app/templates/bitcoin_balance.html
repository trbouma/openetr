<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_title }} Bitcoin Balance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #f5efe3;
        --panel: #fffaf4;
        --text: #1f1a14;
        --accent: #8a5b2d;
        --border: #d7c3a2;
        --muted: #675c4d;
        --heading: #18130d;
      }
      body {
        margin: 0;
        font-family: "Manrope", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(244, 198, 112, 0.22) 0, transparent 24rem),
          radial-gradient(circle at top right, rgba(166, 118, 58, 0.08) 0, transparent 20rem),
          linear-gradient(180deg, #f8f1e4 0%, var(--bg) 100%);
      }
      main {
        max-width: 62rem;
        margin: 4rem auto;
        padding: 0 1.25rem;
      }
      .panel {
        background: color-mix(in srgb, var(--panel) 96%, white);
        border: 1px solid var(--border);
        border-radius: 1.4rem;
        padding: 1.75rem;
        box-shadow: 0 18px 44px rgba(71, 44, 17, 0.08);
        margin-bottom: 1rem;
      }
      h1, h2 {
        margin-top: 0;
        color: var(--heading);
        letter-spacing: -0.04em;
      }
      h1 {
        margin-bottom: 0.35rem;
        font-size: clamp(2.3rem, 7vw, 4rem);
        line-height: 0.98;
        font-weight: 800;
      }
      h2 {
        font-size: 1.15rem;
        line-height: 1.1;
        font-weight: 700;
      }
      p {
        line-height: 1.7;
        color: var(--muted);
      }
      form {
        display: grid;
        gap: 0.9rem;
        margin-top: 1.25rem;
        width: 100%;
      }
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        background: white;
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        padding: 0.8rem;
        font: inherit;
      }
      textarea {
        width: 100%;
        min-height: 10rem;
        box-sizing: border-box;
        background: white;
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        padding: 0.8rem;
        font: inherit;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      label {
        display: grid;
        gap: 0.45rem;
        font-weight: 700;
        color: var(--heading);
      }
      .notice {
        margin-bottom: 1rem;
        padding: 0.8rem 1rem;
        border-radius: 0.75rem;
      }
      .notice.error {
        background: #fff1ec;
        border: 1px solid #e1a18d;
      }
      .notice.success {
        background: #eef8ee;
        border: 1px solid #9cc39c;
      }
      .kv {
        display: grid;
        grid-template-columns: minmax(10rem, 14rem) minmax(0, 1fr);
        gap: 0.35rem 1rem;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        word-break: break-all;
      }
      .qr-address {
        position: relative;
        display: inline-block;
        cursor: pointer;
      }
      .qr-address .address-value {
        text-decoration: underline dotted;
        text-underline-offset: 0.18rem;
      }
      .qr-popover {
        position: absolute;
        left: 0;
        top: calc(100% + 0.6rem);
        display: none;
        z-index: 20;
        min-width: 12rem;
        padding: 0.8rem;
        border: 1px solid var(--border);
        border-radius: 0.9rem;
        background: rgba(255, 250, 244, 0.98);
        box-shadow: 0 18px 40px rgba(71, 44, 17, 0.16);
      }
      .qr-address:hover .qr-popover,
      .qr-address:focus-within .qr-popover,
      .qr-address.open .qr-popover {
        display: block;
      }
      .qr-canvas {
        display: flex;
        justify-content: center;
        margin-bottom: 0.55rem;
      }
      .qr-canvas img,
      .qr-canvas canvas {
        width: 144px;
        height: 144px;
      }
      .qr-label {
        margin: 0 0 0.35rem;
        color: var(--accent);
        font-size: 0.74rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      button {
        width: fit-content;
        border: 0;
        border-radius: 999px;
        padding: 0.9rem 1.3rem;
        background: var(--accent);
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(138, 91, 45, 0.22);
      }
      .actions {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 1rem;
      }
      .top-nav {
        display: flex;
        justify-content: flex-end;
        gap: 1rem;
        margin-bottom: 1rem;
      }
      .top-nav a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
      .eyebrow {
        margin: 0 0 0.85rem;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      @media (max-width: 720px) {
        .kv {
          grid-template-columns: 1fr;
        }
        .qr-popover {
          left: 50%;
          transform: translateX(-50%);
          width: min(16rem, calc(100vw - 3rem));
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="top-nav">
        <a href="/">Home</a>
        <a href="/overview">Overview</a>
        <a href="/bitcoin/check-balance">Bitcoin Balance</a>
        <a href="{{ site_url }}" target="_blank" rel="noopener noreferrer">GitHub</a>
        {% if identity.logged_in %}
        <a href="/logout">Logout</a>
        {% else %}
        <a href="/login">Login</a>
        {% endif %}
      </div>
      {% include "bitcoin_balance_fragment.html" %}
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
      function buildBalanceShareUrl() {
        const shell = document.getElementById('bitcoin-balance-shell');
        if (!shell) {
          return new URL('/bitcoin/check-balance', window.location.origin).toString();
        }
        const nostrInput = shell.querySelector('input[name="nostr_key"]');
        const transactionLimitInput = shell.querySelector('input[name="transaction_limit"]');
        const url = new URL('/bitcoin/check-balance', window.location.origin);
        const nostrKey = (nostrInput?.value || '').trim();
        const transactionLimit = (transactionLimitInput?.value || '').trim();
        if (nostrKey) {
          url.searchParams.set('nostr_key', nostrKey);
        }
        if (transactionLimit) {
          url.searchParams.set('transaction_limit', transactionLimit);
        }
        return url.toString();
      }

      function syncBalancePageUrl() {
        const shell = document.getElementById('bitcoin-balance-shell');
        if (!shell) {
          return;
        }
        const nostrInput = shell.querySelector('input[name="nostr_key"]');
        const nostrKey = (nostrInput?.value || '').trim();
        const nextUrl = nostrKey ? buildBalanceShareUrl() : new URL('/bitcoin/check-balance', window.location.origin).toString();
        window.history.replaceState({}, '', nextUrl);
      }

      function initializeShareLink() {
        const button = document.getElementById('share-balance-link-button');
        const status = document.getElementById('share-balance-link-status');
        if (!button || !status || button.dataset.bound === 'yes') {
          return;
        }
        button.dataset.bound = 'yes';
        button.addEventListener('click', async () => {
          const shareUrl = buildBalanceShareUrl();
          try {
            await navigator.clipboard.writeText(shareUrl);
            status.textContent = 'Copied current link.';
          } catch (error) {
            status.textContent = shareUrl;
          }
        });
      }

      function renderAddressQrs(scope) {
        (scope || document).querySelectorAll('.qr-address').forEach((container) => {
          const canvas = container.querySelector('.qr-canvas');
          if (!canvas || canvas.dataset.rendered === 'yes' || typeof QRCode === 'undefined') {
            return;
          }
          const address = container.dataset.address;
          if (!address) {
            return;
          }
          new QRCode(canvas, {
            text: address,
            width: 144,
            height: 144,
            correctLevel: QRCode.CorrectLevel.M,
          });
          canvas.dataset.rendered = 'yes';
        });
      }

      document.addEventListener('DOMContentLoaded', () => {
        renderAddressQrs(document);
        initializeShareLink();
        syncBalancePageUrl();
      });

      document.body.addEventListener('click', (event) => {
        const container = event.target.closest('.qr-address');
        if (container) {
          const insidePopover = event.target.closest('.qr-popover');
          if (!insidePopover) {
            container.classList.toggle('open');
          }
          return;
        }
        document.querySelectorAll('.qr-address.open').forEach((item) => {
          item.classList.remove('open');
        });
      });

      document.body.addEventListener('htmx:afterSwap', (event) => {
        if (event.target && event.target.id === 'bitcoin-balance-shell') {
          renderAddressQrs(event.target);
          initializeShareLink();
          syncBalancePageUrl();
        }
      });
    </script>
  </body>
</html>
