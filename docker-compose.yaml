services:
  web:
    build:
      context: .
      dockerfile: app/Dockerfile
      args:
        OPENETR_GIT_COMMIT: ${OPENETR_GIT_COMMIT:-unknown}
    image: openetr-web
    ports:
      - "8000:8000"
    environment:
      OPENETR_APP_SESSION_SECRET: ${OPENETR_APP_SESSION_SECRET:-openetr-demo-session-secret}
      OPENETR_APP_SESSION_SECRET_FILE: ${OPENETR_APP_SESSION_SECRET_FILE:-}
      OPENETR_ROOT_NSEC: ${OPENETR_ROOT_NSEC:-}
      OPENETR_ROOT_NSEC_FILE: ${OPENETR_ROOT_NSEC_FILE:-}
      OPENETR_HOME_RELAYS: ${OPENETR_HOME_RELAYS:-}
      OPENETR_HOME_RELAYS_FILE: ${OPENETR_HOME_RELAYS_FILE:-}
      OPENETR_GIT_COMMIT: ${OPENETR_GIT_COMMIT:-unknown}
      OPENETR_PUBLIC_BASE_URL: ${OPENETR_PUBLIC_BASE_URL:-}
      OPENETR_MAX_UPLOAD_BYTES: ${OPENETR_MAX_UPLOAD_BYTES:-}
      OPENETR_BLOSSOM_SERVER: ${OPENETR_BLOSSOM_SERVER:-}
      OPENETR_BLOSSOM_TIMEOUT_SECONDS: ${OPENETR_BLOSSOM_TIMEOUT_SECONDS:-}
    command:
      - gunicorn
      - app.main:app
      - -k
      - uvicorn.workers.UvicornWorker
      - --bind
      - 0.0.0.0:8000
