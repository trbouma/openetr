site_name: OpenETR
site_description: Documentation for OpenETR, a control layer for electronic transferable records and other controllable records.
site_url: https://trbouma.github.io/openetr/
repo_url: https://github.com/trbouma/openetr
repo_name: trbouma/openetr
edit_uri: edit/main/docs-site/

docs_dir: docs-site
site_dir: site

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: brown
      accent: amber

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - OpenETR:
      - Overview: openetr/index.md
      - Control Layer: openetr/control-layer.md
      - Nostr Wire Format: openetr/wire-format.md
      - Component And CLI: openetr/component-and-cli.md
      - Integration Model: openetr/integration.md
      - Recognition Boundary: openetr/recognition.md
  - Domains:
      - Warehouse Receipts:
          - Overview: getting-started.md
          - Creating Control Records: issuing-receipts.md
          - Control Actions: control-actions.md
          - Identity Model: identity-model.md
          - Verifier Policy: verifier-policy.md
          - Article Mapping: mlwr-article-mapping.md
          - Domain Architecture: architecture.md
      - Product Passports:
          - Overview: product-passports.md
          - Requirements Mapping: product-passport-requirements.md
      - Health Records:
          - Overview: health-records.md
      - Apostille Documents:
          - Overview: apostille-documents.md
  - Policy Briefs:
      - Why OpenETR: policy-briefs/why-openetr.md
      - Why Control Is Not Recognition: policy-briefs/why-control-is-not-recognition.md
      - Policy Guards And Cryptographic Evidence: policy-briefs/policy-guards-and-cryptographic-evidence.md
      - EUDI Wallet And OpenETR: policy-briefs/eudi-wallet-and-openetr.md
      - OpenETR, Trust Frameworks, And Registries: policy-briefs/openetr-trust-frameworks-and-registries.md
  - Source:
      - Installation And Local Development: installation.md
      - Live Control Desk: https://openetr.org
      - GitHub Repository: https://github.com/trbouma/openetr
      - Specification Index: https://github.com/trbouma/openetr/blob/main/docs/specs/INDEX.md
