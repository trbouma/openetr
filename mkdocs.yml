site_name: MLWR Control Desk
site_description: Domain documentation for the OpenETR MLWR warehouse receipt control desk.
site_url: https://trbouma.github.io/openetr/
repo_url: https://github.com/trbouma/openetr
repo_name: trbouma/openetr
edit_uri: edit/main/docs-site/

docs_dir: docs-site
site_dir: site

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: brown
      accent: amber

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - MLWR Control Desk:
      - Live Control Desk: https://openetr.org
      - Getting Started: getting-started.md
      - Issuing Receipts: issuing-receipts.md
      - Control Actions: control-actions.md
      - Identity Model: identity-model.md
      - Verifier Policy: verifier-policy.md
      - Article Mapping: article-mapping.md
      - Domain Architecture: architecture.md
  - OpenETR:
      - Overview: openetr/index.md
      - Control Layer: openetr/control-layer.md
      - Nostr Wire Format: openetr/wire-format.md
      - Component And CLI: openetr/component-and-cli.md
      - Integration Model: openetr/integration.md
      - Recognition Boundary: openetr/recognition.md
  - Source:
      - GitHub Repository: https://github.com/trbouma/openetr
      - Specification Index: https://github.com/trbouma/openetr/blob/main/docs/specs/INDEX.md
